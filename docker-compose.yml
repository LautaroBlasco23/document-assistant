services:

  # ── Infrastructure ────────────────────────────────────────────────────────────

  qdrant:
    image: qdrant/qdrant:v1.13.2
    container_name: docassist_qdrant
    restart: unless-stopped
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - qdrant_data:/qdrant/storage
    healthcheck:
      test: ["CMD", "bash", "-c", "echo > /dev/tcp/localhost/6333"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 10s
    networks:
      - docassist_network

  neo4j:
    image: neo4j:5
    container_name: docassist_neo4j
    restart: unless-stopped
    ports:
      - "7474:7474"
      - "7687:7687"
    environment:
      NEO4J_AUTH: neo4j/${NEO4J_PASSWORD}
      NEO4J_PLUGINS: '["apoc"]'
    volumes:
      - neo4j_data:/data
    healthcheck:
      test: ["CMD-SHELL", "cypher-shell -u neo4j -p ${NEO4J_PASSWORD} 'RETURN 1' || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    networks:
      - docassist_network

  postgres:
    image: postgres:17.4-alpine
    container_name: docassist_postgres
    restart: unless-stopped
    ports:
      - "5432:5432"
    environment:
      POSTGRES_DB: docassist
      POSTGRES_USER: docassist
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U docassist"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 10s
    networks:
      - docassist_network

  # ── Application ───────────────────────────────────────────────────────────────

  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    container_name: docassist_backend
    restart: unless-stopped
    environment:
      # Override localhost defaults from config/default.yml with Docker service names
      - DOCASSIST_QDRANT__URL=http://qdrant:6333
      - DOCASSIST_NEO4J__URI=bolt://neo4j:7687
      - DOCASSIST_NEO4J__PASSWORD=${NEO4J_PASSWORD}
      - DOCASSIST_POSTGRES__HOST=postgres
      - DOCASSIST_POSTGRES__PASSWORD=${POSTGRES_PASSWORD}
      # Ollama runs on the host — host.docker.internal resolves via extra_hosts below
      - DOCASSIST_OLLAMA__BASE_URL=http://host.docker.internal:11434
      # LLM provider and credentials
      - DOCASSIST_LLM_PROVIDER=${DOCASSIST_LLM_PROVIDER:-groq}
      - DOCASSIST_GROQ__API_KEY=${DOCASSIST_GROQ__API_KEY:-}
      - DOCASSIST_OPENROUTER__API_KEY=${DOCASSIST_OPENROUTER__API_KEY:-}
      - DOCASSIST_HUGGINGFACE__API_KEY=${DOCASSIST_HUGGINGFACE__API_KEY:-}
      # CORS: origins computed by scripts/setupEnv.sh from DOMAIN + NGINX_PORT
      - ALLOWED_ORIGINS=${ALLOWED_ORIGINS:-http://localhost}
    extra_hosts:
      - "host.docker.internal:host-gateway"
    volumes:
      # Bind-mount data/ so documents and the embedding cache persist on the host
      - ./data:/app/data
      # Mount config as read-only so you can edit default.yml without rebuilding
      - ./config:/config:ro
    depends_on:
      qdrant:
        condition: service_healthy
      neo4j:
        condition: service_healthy
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://localhost:8000/api/health')\" || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s
    networks:
      - docassist_network

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: docassist_frontend
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://127.0.0.1:80"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s
    networks:
      - docassist_network

  # ── Reverse proxy ─────────────────────────────────────────────────────────────

  nginx:
    image: nginx:1.27-alpine
    container_name: docassist_nginx
    restart: unless-stopped
    ports:
      - "${NGINX_PORT:-80}:80"
    environment:
      - DOMAIN=${DOMAIN:-localhost}
      - FORWARDED_PROTO=${FORWARDED_PROTO:-http}
    volumes:
      - ./nginx/nginx.conf.template:/etc/nginx/templates/default.conf.template:ro
    depends_on:
      backend:
        condition: service_healthy
      frontend:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://127.0.0.1:80"]
      interval: 30s
      timeout: 5s
      retries: 3
    networks:
      - docassist_network

volumes:
  qdrant_data:
  neo4j_data:
  postgres_data:

networks:
  docassist_network:
    driver: bridge
