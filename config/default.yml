llm_provider: "groq"  # "ollama" | "groq" | "openrouter" | "huggingface"
flashcard_model: "main"  # "main" | "fast" -- use "fast" for speed, "main" for quality

ollama:
  base_url: "http://localhost:11434"
  generation_model: "qwen2.5:14b-instruct"
  fast_model: "qwen2.5:3b-instruct"  # Smaller model for bulk generation tasks
  timeout: 300

groq:
  # api_key: set via DOCASSIST_GROQ__API_KEY env var (never commit keys here)
  base_url: "https://api.groq.com/openai/v1"
  model: "llama-3.3-70b-versatile"
  fast_model: "llama-3.1-8b-instant"
  timeout: 60
  max_retries: 3
  max_retries_chat: 1
  requests_per_minute: 25  # proactive rate limit for Groq free tier

openrouter:
  # api_key: set via DOCASSIST_OPENROUTER__API_KEY env var (never commit keys here)
  base_url: "https://openrouter.ai/api/v1"
  model: "meta-llama/llama-3.3-70b-instruct:free"
  fast_model: "qwen/qwen2.5-7b-instruct:free"
  timeout: 120
  max_retries: 3
  requests_per_minute: 10  # proactive rate limit; reduce further for :free models if 429s persist

huggingface:
  # api_key: set via DOCASSIST_HUGGINGFACE__API_KEY env var (never commit keys here)
  base_url: "https://router.huggingface.co/v1"
  model: "Qwen/Qwen2.5-72B-Instruct"
  timeout: 180
  max_retries: 3
  max_retries_chat: 1
  requests_per_minute: 80  # proactive rate limit for HuggingFace free tier
  wait_for_model: true

chunking:
  max_tokens: 512
  overlap_tokens: 128

postgres:
  host: "localhost"
  port: 5432
  database: "docassist"
  user: "docassist"
  password: "docassist_pass"

exam:
  cooldown_after_fail_hours: 2
  cooldown_completed_days: 4
  cooldown_gold_days: 14
  cooldown_platinum_days: 30

epub:
  chapter_depth: 1
  min_chapter_words: 100
