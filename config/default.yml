llm_provider: "groq"  # "ollama" or "groq"

ollama:
  base_url: "http://localhost:11434"
  generation_model: "qwen2.5:14b-instruct"
  fast_model: "qwen2.5:3b-instruct"  # Smaller model for bulk generation tasks
  embedding_model: "nomic-embed-text"
  timeout: 300

groq:
  # api_key: set via DOCASSIST_GROQ__API_KEY env var (never commit keys here)
  base_url: "https://api.groq.com/openai/v1"
  model: "mixtral-8x7b-32768"
  fast_model: "llama-3.1-8b-instant"
  timeout: 60
  max_retries: 3

qdrant:
  url: "http://localhost:6333"
  collection_name: "documents"

neo4j:
  uri: "bolt://localhost:7687"
  user: "neo4j"
  password: "document_assistant_pass"

chunking:
  max_tokens: 512
  overlap_tokens: 128

postgres:
  host: "localhost"
  port: 5432
  database: "docassist"
  user: "docassist"
  password: "docassist_pass"
